services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mobility_ops
      POSTGRES_USER: mobility
      POSTGRES_PASSWORD: mobility
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./backend/migrations/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobility -d mobility_ops"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://mobility:mobility@postgres:5432/mobility_ops?sslmode=disable
      ALLOWED_ORIGIN: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
